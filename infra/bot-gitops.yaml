apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: experto-docker-bot
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/frxngv/rag-docker-microservice.git' # URL del repo
    targetRevision: HEAD
    path: k8s # La carpeta donde están los YAML
  destination:
    server: 'https://kubernetes.default.svc' # El clúster interno
    namespace: default
  syncPolicy:
    automated:
      prune: true     # Borra cosas si las borras de GitHub
      selfHeal: true  # Si alguien borra algo a mano en el clúster, ArgoCD lo restaura
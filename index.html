<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker RAG Assistant</title>
    <style>
        :root {
            --bg-main: #121212;
            --bg-container: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --border-color: #333333;
            --accent-color: #3b82f6;
            --msg-user: #2563eb;
            --msg-bot: #2a2a2a;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        .chat-container { 
            width: 100%;
            max-width: 700px; 
            background: var(--bg-container); 
            border: 1px solid var(--border-color);
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            height: 85vh; 
        }
        
        .header { 
            border-bottom: 1px solid var(--border-color); 
            padding: 16px 24px; 
            text-align: left; 
            font-weight: 600; 
            font-size: 1.1rem; 
            letter-spacing: 0.5px;
            color: #ffffff;
        }
        
        .chat-box { 
            flex: 1; 
            padding: 24px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
        }
        
        .message { 
            padding: 14px 18px; 
            border-radius: 6px; 
            max-width: 85%; 
            line-height: 1.6; 
            font-size: 0.95rem;
        }
        
        .user-msg { 
            background: var(--msg-user); 
            color: #ffffff; 
            align-self: flex-end; 
        }
        
        .bot-msg { 
            background: var(--msg-bot); 
            color: var(--text-main); 
            align-self: flex-start; 
            border: 1px solid var(--border-color);
        }
        
        .input-area { 
            display: flex; 
            padding: 20px 24px; 
            border-top: 1px solid var(--border-color); 
            gap: 12px;
        }
        
        input[type="text"] { 
            flex: 1; 
            padding: 14px; 
            background-color: var(--bg-main);
            color: var(--text-main);
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            outline: none; 
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus {
            border-color: var(--accent-color);
        }
        
        button { 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            padding: 0 24px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        
        button:hover { 
            background: #1d4ed8; 
        }
        
        .loading { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            align-self: flex-start; 
            display: none; 
            margin-left: 24px; 
            margin-bottom: 12px;
        }
        
        /* Personalización de la barra de scroll */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-container); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Docker RAG Assistant</div>
    <div class="chat-box" id="chat-box">
        <div class="message bot-msg">Hola. Soy tu asistente experto en Docker. Pregúntame sobre volúmenes, redes o buenas prácticas.</div>
    </div>
    <div class="loading" id="loading">Procesando respuesta...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Escribe tu pregunta..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const question = inputField.value.trim();
        if (!question) return;

        addMessage(question, 'user-msg');
        inputField.value = '';
        
        const loading = document.getElementById('loading');
        loading.style.display = 'block';

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: question })
            });
            
            const data = await response.json();
            addMessage(data.answer, 'bot-msg');
        } catch (error) {
            addMessage("Error de conexión con el servidor.", 'bot-msg');
        } finally {
            loading.style.display = 'none';
        }
    }

    function addMessage(text, className) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
